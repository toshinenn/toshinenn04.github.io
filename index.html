<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garo Farewell 2026</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #121212;
    color: #e0e0e0;
    overflow: hidden;
}

/* NAVBAR */
.navbar {
    position: fixed;
    width: 100%;
    background: #1a1a1a;
    padding: 10px;
    text-align: center;
    z-index: 1000;
}

.navbar button {
    margin: 5px;
    padding: 10px 15px;
    background: #2a2a2a;
    color: #e0e0e0;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.navbar button:hover {
    background: #444;
}

/* SECTIONS */
.section {
    display: none;
    height: 100vh;
    padding-top: 70px;
    text-align: center;
    overflow-y: auto;
}

.active {
    display: block;
}

/* COVER */
.cover {
    height: calc(100vh - 70px);
    background: url('cover.jpg') no-repeat center;
    background-size: contain;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(40, 40, 40, 0.75);
    padding: 25px;
    border-radius: 15px;
    color: #e0e0e0;
}

/* FORCE GREY HEADINGS */
h1, h2, h3 {
    color: #d1d1d1 !important;
}

h2 {
    margin-bottom: 15px;
}

/* PROGRAM */
#program p {
    margin: 12px;
    font-size: 18px;
}

/* FOOD */
.food-container {
    min-height: calc(100vh - 140px);
    padding-bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    margin-top: 20px;
}

.food-card {
    background: #1f1f1f;
    padding: 15px;
    border-radius: 15px;
    width: 80%;
    max-width: 320px;
}

.food-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.food-card p {
    margin-top: 10px;
    color: #cccccc;
    font-size: 17px;
}

/* MAP */
iframe {
    width: 90%;
    height: 300px;
    border: none;
    border-radius: 10px;
}

.location-text {
    margin-top: 15px;
    color: #cccccc;
    padding: 0 20px;
}
</style>
</head>

<body>

<div class="navbar">
    <button onclick="showSection('home')">Okamani Chitti</button>
    <button onclick="showSection('program')">Program</button>
    <button onclick="showSection('food')">Food Items</button>
    <button onclick="showSection('location')">Location</button>
</div>

<div id="home" class="section active">
    <div class="cover">
        <div class="card">
            <h1>ADBU A'chik Nokdang Farewell 2026</h1>
            <p id="countdown"></p>
        </div>
    </div>
</div>

<div id="program" class="section">
    <h2>🎤 Program</h2>
    <p>Opening Speech</p>
    <p>Dance</p>
    <p>Music</p>
</div>

<div id="food" class="section">
    <h2>🍽 Food Items</h2>

    <div class="food-container">
        <div class="food-card">
            <img src="doo_kappa.jpg">
            <p>Do'o Kappa</p>
        </div>

        <div class="food-card">
            <img src="wak_tangsek_pura.jpg">
            <p>Wak Tangsek Pura</p>
        </div>

        <div class="food-card">
            <img src="gominda_wak.jpg">
            <p>Gominda Wak</p>
        </div>

        <div class="food-card">
            <img src="dochi_rita.jpg">
            <p>Do'chi Rita</p>
        </div>

        <div class="food-card">
            <img src="dal.jpg">
            <p>Dal</p>
        </div>

        <div class="food-card">
            <img src="mi.jpg">
            <p>Mi</p>
        </div>
    </div>
</div>

<div id="location" class="section">
    <h2>📍 Location</h2>

    <a href="https://maps.google.com/?q=Hotel+Neexotica+Banquet+Hall+Azara+Guwahati" target="_blank">
        <iframe src="https://maps.google.com/maps?q=Hotel+Neexotica+Banquet+Hall+Azara+Guwahati&output=embed"></iframe>
    </a>

    <p class="location-text">
        Hotel Nexotica, Banquet Hall, Azara, Opp. Mountain Shadow, Guwahati - 781017
    </p>
</div>

<script>
function showSection(id) {
    let sections = document.querySelectorAll(".section");

    sections.forEach(function(section) {
        section.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
}

var countDate = new Date("May 1, 2026 14:00:00").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var distance = countDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    var seconds = Math.floor((distance % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}, 1000);
</script>

</body>
</html>
