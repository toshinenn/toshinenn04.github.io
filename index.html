<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garo Farewell 2026</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #111;
    color: white;
    overflow: hidden;
}

/* NAVBAR */
.navbar {
    position: fixed;
    width: 100%;
    background: black;
    padding: 10px;
    text-align: center;
}

.navbar button {
    margin: 5px;
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
}

/* SECTIONS */
.section {
    display: none;
    height: 100vh;
    padding-top: 60px;
    text-align: center;
}

.active {
    display: block;
}

/* COVER */
.cover {
    height: 100%;
    background: url('cover.jpg') no-repeat center;
    background-size: contain; /* shows full image */
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 15px;
    color: gold;
}

/* FOOD */
.food-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
}

.food-card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    width: 80%;
    max-width: 300px;
}

.food-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.food-card p {
    margin-top: 10px;
    color: gold;
}

/* MAP */
iframe {
    width: 90%;
    height: 300px;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button onclick="showSection('home')">Okamani Chitti</button>
    <button onclick="showSection('Hrogram')">Program</button>
    <button onclick="showSection('Food')">Food</button>
    <button onclick="showSection('Location')">Location</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
    <div class="cover">
        <div class="card">
            <h1>ADBU A'chik Nokdang Farewell 2026</h1>
            <p id="countdown"></p>
        </div>
    </div>
</div>

<!-- PROGRAM -->
<div id="program" class="section">
    <h2>🎤 Program</h2>
    <p>Opening Speech</p>
    <p>Dance</p>
    <p>Music</p>
</div>

<!-- FOOD -->
<div id="food" class="section">
    <h2>🍽 Food</h2>

    <div class="food-container">
 <div class="food-card">
            <img src="doo_kappa.jpg">
            <p>Do'o Kappa</p>
        </div>

        <div class="food-card">
            <img src="wak_tangsek_pura.jpg">
            <p>Wak Tangsek Pura</p>
        </div>

        <div class="food-card">
            <img src="gominda_wak.jpg">
            <p>Gominda Wak</p>
        </div>

        <div class="food-card">
            <img src="dochi_rita.jpg">
            <p>Do'chi Rita</p>
        </div>

        <div class="food-card">
            <img src="dal.jpg">
            <p>Dal</p>
        </div>

        <div class="food-card">
            <img src="mi.jpg">
            <p>Mi</p>
        </div>

    </div>
</div>

<!-- LOCATION -->
<div id="location" class="section">
    <h2>📍 Location</h2>
    <a href="https://maps.google.com/?q=Hotel+Nexotica+Banquet+Hall+Azara+Guwahati" target="_blank">
        <iframe src="https://maps.google.com/maps?q=Hotel+Nexotica+Banquet+Hall+Azara+Guwahati&output=embed"></iframe>
    </a>
</div>

<script>
// SECTION SWITCH
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}

// COUNTDOWN
var countDate = new Date("May 1, 2026 16:00:00").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var distance = countDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    var seconds = Math.floor((distance % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}, 1000);
</script>

</body>
</html>
