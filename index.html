<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garo Farewell 2026</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        scroll-behavior: smooth;
        background: #111;
        color: white;
        text-align: center;
    }

    /* COVER */
    .cover {
        height: 100vh;
        background: url('cover.jpg') no-repeat center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .cover::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
    }

    .cover-content {
        position: relative;
        z-index: 1;
    }

    .cover h1 {
        font-size: 3em;
    }

    .cover p {
        margin-top: 10px;
        font-size: 1.2em;
    }

    .btn {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        background: gold;
        cursor: pointer;
        border-radius: 20px;
    }

    section {
        padding: 60px 20px;
    }

    h2 {
        color: gold;
        margin-bottom: 20px;
    }

    .box {
        background: #222;
        padding: 20px;
        border-radius: 10px;
        display: inline-block;
        width: 80%;
        max-width: 500px;
    }

    /* FOOD IMAGES */
    .food img {
        width: 200px;
        margin: 10px;
        border-radius: 10px;
    }

    /* MAP */
    iframe {
        width: 90%;
        height: 300px;
        border-radius: 10px;
        border: none;
    }

</style>
</head>

<body>

<!-- COVER -->
<div class="cover">
    <div class="cover-content">
        <h1>Garo Farewell 2026</h1>
        <p>Write your message here 💛</p>
        <a href="#program"><button class="btn">Enter</button></a>
    </div>
</div>

<!-- PROGRAM -->
<section id="program">
    <h2>🎤 Program</h2>
    <div class="box">
        <p>• Add your program here</p>
        <p>• Dance</p>
        <p>• Speech</p>
    </div>
</section>

<!-- FOOD -->
<section>
    <h2>🍽 Food</h2>
    <div class="food">
        <img src="food1.jpg">
        <img src="food2.jpg">
    </div>
</section>

<!-- LOCATION -->
<section>
    <h2>📍 Location</h2>

    <!-- Clickable map -->
    <a href="https://maps.google.com/?q=YOUR_LOCATION" target="_blank">
        <iframe 
        src="https://maps.google.com/maps?q=YOUR_LOCATION&output=embed">
        </iframe>
    </a>

</section>

</body>
</html>
