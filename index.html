<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garo Farewell 2026</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    scroll-behavior: smooth;
    background: #111;
    color: white;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    z-index: 10;
}

.navbar a {
    color: white;
    text-decoration: none;
}

/* COVER */
.cover {
    height: 100vh;
    background: url('cover.jpg') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: gold;
}

/* SECTIONS */
.section {
    min-height: 100vh;
    padding: 80px 20px;
    text-align: center;
}

h2 {
    color: gold;
    margin-bottom: 20px;
}

/* FOOD */
.food img {
    width: 220px;
    margin: 10px;
    border-radius: 10px;
}

/* MAP */
iframe {
    width: 90%;
    height: 350px;
    border-radius: 10px;
    border: none;
}

/* CONFETTI */
#confetti {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#">Home</a>
    <a href="#program">Program</a>
    <a href="#food">Food</a>
    <a href="#location">Location</a>
</div>

<!-- COVER -->
<div class="cover">
    <div class="card">
        <h1>Garo Farewell 2026</h1>
        <p id="countdown"></p>
    </div>
</div>

<canvas id="confetti"></canvas>

<!-- PROGRAM -->
<div class="section" id="program">
    <h2>🎤 Program</h2>
    <p>• Opening Speech</p>
    <p>• Cultural Dance</p>
    <p>• Music Performance</p>
    <p>• Farewell Speech</p>
</div>

<!-- FOOD -->
<div class="section" id="food">
    <h2>🍽 Food</h2>
    <div class="food">
        <img src="food1.jpg">
        <img src="food2.jpg">
    </div>
</div>

<!-- LOCATION -->
<div class="section" id="location">
    <h2>📍 Location</h2>

    <a href="https://maps.google.com/?q=Don+Bosco+University+Guwahati" target="_blank">
        <iframe src="https://maps.google.com/maps?q=Don+Bosco+University+Guwahati&output=embed"></iframe>
    </a>

</div>

<!-- SCRIPT -->
<script>

// CHANGE DATE HERE
var countDate = new Date("May 31, 2026 16:00:00").getTime();

var x = setInterval(function() {

    var now = new Date().getTime();
    var distance = countDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    var seconds = Math.floor((distance % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";

    if (distance < 0) {
        clearInterval(x);
        document.getElementById("countdown").innerHTML = "🎉 IT'S TIME 🎉";
        startConfetti();
    }

}, 1000);


// CONFETTI
function startConfetti() {
    var canvas = document.getElementById("confetti");
    var ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    var pieces = [];
    for (let i = 0; i < 120; i++) {
        pieces.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            size: Math.random()*6+3,
            speed: Math.random()*3+2
        });
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);

        pieces.forEach(p=>{
            p.y += p.speed;
            if(p.y > canvas.height) p.y = 0;

            ctx.fillStyle = "hsl(" + Math.random()*360 + ",100%,50%)";
            ctx.fillRect(p.x,p.y,p.size,p.size);
        });

        requestAnimationFrame(draw);
    }

    draw();
}

</script>

</body>
</html>
