<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADBU A'chik Nokdang Farewell 2026</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    scroll-behavior: smooth;
    background: #111;
    color: white;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    z-index: 10;
}

.navbar a {
    color: white;
    text-decoration: none;
}

/* COVER */
.cover {
    height: 100vh;
    background: url('Cover page.jpg') no-repeat center;
    background-size: contain;   /* shows full image */
    background-color: black;    /* fills empty space */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: gold;
}

/* SECTIONS */
.section {
    min-height: 100vh;
    padding: 80px 20px;
    text-align: center;
}

h2 {
    color: gold;
    margin-bottom: 20px;
}

/* FOOD */
.section {
    min-height: 100vh;
    padding: 100px 20px;
    text-align: center;
    border-top: 1px solid #333;
}
/* MAP */
iframe {
    width: 90%;
    height: 350px;
    border-radius: 10px;
    border: none;
}

/* CONFETTI */
#confetti {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>

</head>

<body>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('program')">Program</button>
    <button onclick="showSection('food')">Food</button>
    <button onclick="showSection('location')">Location</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
    <div class="cover">
        <div class="card">
            <h1>Garo Farewell 2026</h1>
            <p id="countdown"></p>
        </div>
    </div>
</div>

<!-- PROGRAM -->
<div id="program" class="section">
    <h2>🎤 Program</h2>
    <p>• Opening Speech</p>
    <p>• Dance</p>
    <p>• Music</p>
</div>

<!-- FOOD -->
<div id="food" class="section">
    <h2>🍽 Food</h2>
    <img src="Do'o Kappa.jpg">
    <img src="Wak Tangsek Pura.jpg">
    <img src="Gominda Wak.jpg">
    <img src="Do'chi Rita.jpg">
    <img src="Dal.jpg">
    <img src="Mi.jpg">
</div>

<!-- LOCATION -->
<div id="location" class="section">
    <h2>📍 Location</h2>
    <a href="https://maps.google.com/?q=Hotel+Nexotica+Banquet+Hall+Azara+Guwahati" target="_blank">
        <iframe src="https://maps.google.com/maps?q=Hotel+Nexotica+Banquet+Hall+Azara+Guwahati&output=embed"></iframe>
    </a>
</div>

<style>
body {
    margin: 0;
    overflow: hidden; /* 🚫 no scrolling */
    font-family: Arial;
}

/* NAVBAR */
.navbar {
    position: fixed;
    width: 100%;
    background: black;
    padding: 10px;
    text-align: center;
}

.navbar button {
    margin: 5px;
    padding: 10px;
    background: gold;
    border: none;
}

/* SECTIONS */
.section {
    display: none;
    height: 100vh;
    padding-top: 60px;
    text-align: center;
}

.active {
    display: block;
}

/* COVER */
.cover {
    height: 100%;
    background: url('cover.jpg') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    color: gold;
}

/* FOOD IMAGE */
img {
    width: 200px;
    height: 200px;
    object-fit: cover;
}

/* MAP */
iframe {
    width: 90%;
    height: 300px;
    border: none;
}
</style>

<script>
// SWITCH SECTIONS
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}

// COUNTDOWN
var countDate = new Date("May 1, 2026 16:00:00").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var distance = countDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    var seconds = Math.floor((distance % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}, 1000);
</script>

</body>
